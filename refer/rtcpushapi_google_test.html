<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Stream with Audio Recorder</title>
    <style>
    select {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: white;
        cursor: pointer;
    }

    select:hover {
        border-color: #007bff;
    }

    select:disabled {
        background-color: #f0f0f0;
        cursor: not-allowed;
        opacity: 0.6;
    }

    .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }
    
    .media-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 60px;
        position: relative;
    }

    /* .background-layer {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 600px;
        height: calc(100% - 40px);
        background: url('https://storage.googleapis.com/cdp_materials/tenants/local/2/gSMg2KTGUkQAr4hWmLr5TmbZCaNgK9nda9Kn9JXn.png') no-repeat center center;
        background-size: cover;
        z-index: 1;
    } */
    
    
    .chat-container {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 600px;
        z-index: 10;
        text-align: center;
    }
    
    .controls {
        margin: 10px 0;
        display: flex;
        gap: 10px;
        justify-content: center;
        position: relative;
        z-index: 20;
    }
    
    button {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
    }
    
    button:hover {
        background-color: #0056b3;
    }
    
    button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
    }
    
    video {
        width: 100%;
        max-width: 600px;
        margin: 20px 0;
        z-index: 2;
        position: relative;
    }

    #outputCanvas {
        width: 100%;
        max-width: 600px;
        margin: 20px 0;
        position: absolute;
        /* top: 20px; */
        left: 50%;
        transform: translateX(-50%);
        display: none;
        z-index: 3;
    }

    #rtc_media_player.hidden {
        opacity: 0;
    }

    .error-message {
        color: #dc3545;
        padding: 10px;
        margin: 10px 0;
        background-color: #f8d7da;
        border-radius: 4px;
        display: none;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
        z-index: 1000;
    }

    .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
    }

    .modal-buttons {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    .chat-history {
        margin-top: 0;
        padding: 8px 16px;
        background: transparent;
        overflow-y: auto;
        height: calc(4 * 70px);
        display: flex;
        flex-direction: column;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        position: relative;
        box-sizing: border-box;
    }

    .chat-message {
        display: inline-block;
        margin-bottom: 6px;
        padding: 4px 12px;
        border-radius: 15px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        background-color: rgba(0,0,0,0.6);
        font-size: 16px;
        word-break: break-word;
        text-align: center;
        width: calc(100% - 24px);
        box-sizing: border-box;
    }

    .user-message {
        color: #e3f2fd;
    }

    .ai-message {
        color: #f0fff0;
    }

    .chat-history::-webkit-scrollbar {
        width: 8px;
        position: absolute;
        right: 0;
    }

    .chat-history::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
    }

    .chat-history::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.4);
        border-radius: 8px;
    }

    .chat-history::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.6);
    }

    .session-info {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 14px;
    }

    .input-method-notification {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 193, 7, 0.9);
        color: #000;
        text-align: center;
        padding: 10px;
        font-size: 14px;
        z-index: 1001;
        display: none;
    }

    @media (max-width: 768px) {
        .chat-history::-webkit-scrollbar {
            width: 4px;
        }
    }

    /* 打字指示器樣式 - 與AI回應保持相同寬度 */
    .typing-indicator {
        display: inline-block;
        margin-bottom: 6px;
        padding: 4px 12px;
        border-radius: 15px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        background-color: rgba(0,0,0,0.6);
        font-size: 16px;
        word-break: break-word;
        text-align: center;
        width: calc(100% - 24px);
        box-sizing: border-box;
    }
    
    /* 其餘樣式保持不變 */
    .typing-indicator .dot {
        height: 8px;
        width: 8px;
        margin: 0 3px;
        background-color: #f0fff0;
        border-radius: 50%;
        display: inline-block;
        animation: typingBounce 1.3s infinite;
    }
    
    .typing-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .typing-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
    }
    
    @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-5px); }
    }

    </style>
</head>

    <script>
        $(function(){
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId') || '0';
            document.getElementById('sessionInfo').textContent = `Session ID: ${sessionId}`;
    
            let mediaRecorder = null;
            let audioChunks = [];
            let audioStream = null;
            let dialogHistory = [];
            let checkSpeakingInterval;
            let currentDisplayName = '';
            let canvas, ctx;
            let isGreenScreenEnabled = false;
            let animationFrameId = null;
            let isProcessing = false;
            let sdk = null;
    
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            
            const videoElement = document.getElementById('rtc_media_player');
            const chatHistory = document.getElementById('chatHistory');
            const recordButton = document.getElementById('recordButton');
            const stopButton = document.getElementById('stopButton');
            const errorMessage = document.getElementById('errorMessage');
            const permissionModal = document.getElementById('permissionModal');
            const allowButton = document.getElementById('allowButton');
            const denyButton = document.getElementById('denyButton');
            const transcriptionResult = document.getElementById('transcriptionResult');
            // const toggleGreenScreen = document.getElementById('toggleGreenScreen');
    
            // Input method switching for Mac
            function switchToEnglishInput() {
                if (isMac) {
                    const notification = document.getElementById('inputMethodNotification');
                    notification.style.display = 'block';
                    
                    try {
                        const script = `

async function handleQuickIntro() {
                const userText = "你好，介紹一下你自己";
                const aiResponse = "你好！我是孟鄉生化科技股份有限公司的虛擬助手，專注於提供有關我們的產品和服務的資訊。我們專注於臉部保養、化妝水、護膚液、面膜等產品的OEM/ODM代工服務，並且致力於研發高品質的護膚產品。如果你有任何問題或需要進一步瞭解我們的服務，隨時可以問我！";

                // 先將對話容器添加到DOM但設為隱藏
                chatHistory.appendChild(dialogContainer);
                
                try {
                    $('#rtc_media_player').prop('muted', false);
                    // 發送到/human API
                    await fetch('https://talk-demo.aitago.tw/human', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: aiResponse,
                            type: 'echo',
                            sessionid: parseInt(sessionId)
                        })
                    });

                    // 等待虛擬人開始說話
                    const checkIfSpeaking = setInterval(async () => {
                        try {
                            const response = await fetch('https://talk-demo.aitago.tw/is_speaking', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },

                            });

                                // 保存到對話歷史

                                    ai: aiResponse
                                });
                                
                                // 更新顯示

                            }

                            clearInterval(checkIfSpeaking);
                        }
                    }, 200);

                    setTimeout(() => {
                        clearInterval(checkIfSpeaking);

                    console.error('Error sending message:', error);
                    showError('發送訊息失敗');

            }

            if (isMac) {
                switchToEnglishInput();
                document.addEventListener('compositionstart', () => {
                    document.getElementById('inputMethodNotification').style.display = 'block';
                });
                document.addEventListener('compositionend', () => {
                    setTimeout(() => {
                        document.getElementById('inputMethodNotification').style.display = 'none';
                    }, 3000);
                });
            }
    
            function showError(message) {
                if (errorMessage) {
                    errorMessage.textContent = message;
                    errorMessage.style.display = 'block';
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 5000);
                }
            }
    
            function initializeGreenScreen(videoElement) {
                canvas = document.getElementById('outputCanvas');
                ctx = canvas.getContext('2d');
                
                // canvas.width = videoElement.videoWidth;
                // canvas.height = videoElement.videoHeight;
                // 固定寬度為 600px，根據視頻比例計算高度
                const aspectRatio = videoElement.videoHeight / videoElement.videoWidth;
                canvas.width = 600;
                canvas.height = Math.round(600 * aspectRatio);

                if (isGreenScreenEnabled) {
                    $('#outputCanvas').show();
                    $('#rtc_media_player').css('opacity', '0');
                    processFrame();
                }
                console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Green screen initialized');
            }
    
            function processFrame() {
                if (!isGreenScreenEnabled || isProcessing) {
                    return;
                }
    
                isProcessing = true;
                
                if (videoElement.paused || videoElement.ended) {
                    isProcessing = false;
                    return;
                }
    
                try {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    // ctx.drawImage(videoElement, 0, 0, videoElement.videoWidth, videoElement.videoHeight);
                    // 計算保持長寬比的縮放尺寸
                    const newWidth = videoElement.videoWidth
                    const newHeight = videoElement.videoHeight
                    
                    // 計算居中位置
                    const x = (canvas.width - newWidth) / 2;
                    const y = (canvas.height - newHeight) / 2;
                    
                    // 繪製時使用計算出的位置和尺寸
                    ctx.drawImage(videoElement, 
                        0, 0, videoElement.videoWidth, videoElement.videoHeight,  // source dimensions
                        x, 0, newWidth, newHeight  // destination dimensions with centering
                    );


                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        if (g > r * 1.5 && g > b * 1.5) {
                            data[i + 3] = 0;
                        }
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                } catch (error) {
                    console.error('Error processing frame:', error);
                }
                
                isProcessing = false;
                
                if (isGreenScreenEnabled) {
                    animationFrameId = requestAnimationFrame(processFrame);
                }
            }
    
            // toggleGreenScreen.onclick = function() {
            //     isGreenScreenEnabled = !isGreenScreenEnabled;
    
            //     if (isGreenScreenEnabled) {
            //         $('#rtc_media_player').css('opacity', '0');
            //         $('#outputCanvas').show();
            //         toggleGreenScreen.style.backgroundColor = '#e74c3c';
            //         if (!canvas) {
            //             initializeGreenScreen(videoElement);
            //         }
            //         processFrame();
            //         console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Green screen enabled');
            //     } else {
            //         $('#outputCanvas').hide();
            //         $('#rtc_media_player').css('opacity', '1');
            //         toggleGreenScreen.style.backgroundColor = '#007bff';
            //         if (animationFrameId) {
            //             cancelAnimationFrame(animationFrameId);
            //             animationFrameId = null;
            //         }
            //         console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Green screen disabled');
            //     }
            // };
    
            function startCheckingSpeakingStatus() {
                checkSpeakingInterval = setInterval(async () => {
                    try {
                        const response = await fetch('https://talk-demo.aitago.tw/is_speaking', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                sessionid: parseInt(sessionId)
                            })
                        });
                        const result = await response.json();
                        
                        const avatarSelect = document.getElementById('avatarSelect');
                        const voiceSelect = document.getElementById('voiceSelect');
                        avatarSelect.disabled = result.data;
                        voiceSelect.disabled = result.data;
                        
                        const quickIntroButton = document.getElementById('quickIntroButton');
                        if (result.data) {
                            recordButton.disabled = true;
                            recordButton.style.opacity = "0.6";
                            quickIntroButton.disabled = true;
                            quickIntroButton.style.opacity = "0.6";
                        } else {
                            recordButton.disabled = false;
                            recordButton.style.opacity = "1";
                            quickIntroButton.disabled = false;
                            quickIntroButton.style.opacity = "1";
                        }
                    } catch (error) {
                        console.error('Error checking speaking status:', error);
                    }
                }, 500);
            }
    
            function showPermissionModal() {
                return new Promise((resolve, reject) => {
                    permissionModal.style.display = 'block';
                    
                    allowButton.onclick = async () => {
                        permissionModal.style.display = 'none';
                        resolve(true);
                    };
                    
                    denyButton.onclick = () => {
                        permissionModal.style.display = 'none';
                        resolve(false);
                    };
                });
            }
    
            async function checkAndRequestPermission() {
                try {
                    const permissionStatus = await navigator.permissions.query({ name: 'microphone' });
                    
                    if (permissionStatus.state === 'granted') {
                        return true;
                    } else if (permissionStatus.state === 'prompt') {
                        const userAgreed = await showPermissionModal();
                        if (!userAgreed) {
                            showError('對話功能需要麥克風權限才能使用。');
                            return false;
                        }
                        return true;
                    } else if (permissionStatus.state === 'denied') {
                        showError('麥克風權限已被封鎖。請在瀏覽器設定中更改權限設定。');
                        return false;
                    }
                } catch (err) {
                    const userAgreed = await showPermissionModal();
                    return userAgreed;
                }
            }
    
            function getSupportedMimeType() {
                const types = [
                    'audio/webm;codecs=opus',
                    'audio/mp4',
                    'audio/mpeg',
                    ''
                ];
                
                for (const type of types) {
                    if (type === '' || MediaRecorder.isTypeSupported(type)) {
                        console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' MediaRecorder supported type: ' + type);

                        return type;
                    }
                }
                console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' No supported MediaRecorder type found.');
                return '';
            }
    
            async function requestMicrophoneAccess() {
                try {

                    const hasPermission = await checkAndRequestPermission();
                    if (!hasPermission) {
                        return;
                    }
    
                    audioStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            channelCount: 1,
                            sampleRate: 16000,
                            sampleSize: 16
                        },
                        video: false
                    });
    
                    const mimeType = getSupportedMimeType();
                    const options = {
                        audioBitsPerSecond: 16000
                    };
                    if (mimeType) {
                        options.mimeType = mimeType;
                    }
                    mediaRecorder = new MediaRecorder(audioStream, options);
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await transcribeAudio(audioBlob);
                        audioChunks = [];
                    };
    
                    startRecording();
                    
                } catch (err) {
                    console.error('Microphone access error:', err);
                    let errorMsg = '無法存取麥克風。';
                    
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        errorMsg = '請允許麥克風存取權限。';
                    } else if (err.name === 'NotFoundError') {
                        errorMsg = '找不到麥克風裝置。';
                    } else if (err.name === 'NotReadableError') {
                        errorMsg = '麥克風可能正被其他應用程式使用。';
                    }
                    
                    showError(errorMsg);
                    recordButton.textContent = '開始對話';
                    recordButton.disabled = false;
                    stopButton.disabled = true;
                }
            }
            
            function startRecording() {
                audioChunks = [];
                mediaRecorder.start();
                recordButton.textContent = '對話中...';
                recordButton.disabled = true;
                stopButton.disabled = false;
                transcriptionResult.textContent = '';
                console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Recording started');
            }
            
            function stopRecording() {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    recordButton.textContent = '開始對話';
                    recordButton.disabled = false;
                    stopButton.disabled = true;
                    console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Recording stopped');
                    
                    if (audioStream) {
                        audioStream.getTracks().forEach(track => track.stop());
                        audioStream = null;
                    }
                }
            }
    
            function updateChatDisplay() {
                chatHistory.innerHTML = '';
                const startIndex = Math.max(0, dialogHistory.length - 4);
                for (let i = startIndex; i < dialogHistory.length; i++) {
                    const dialog = dialogHistory[i];
                    const dialogElement = document.createElement('div');
                    dialogElement.innerHTML = `
                        <div class="chat-message user-message">${dialog.user}</div>
                        <div class="chat-message ai-message">${dialog.ai}</div>
                    `;
                    chatHistory.appendChild(dialogElement);
                }
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
    
            async function humantalk(message) {
                $('#rtc_media_player').prop('muted', false);
                console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}`+ ' Sending to /human api : ' + message);
                
                try {
                    await fetch('https://talk-demo.aitago.tw/human', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: message,
                            type: 'echo',
                            sessionid: parseInt(sessionId)
                        })
                    });
                } catch (error) {
                    console.error('Error sending message:', error);
                    showError('發送訊息失敗');
                }
            }
    
// 將 AudioBuffer 轉換為 WAV 格式
function audioBufferToWav(buffer) {
    const numOfChan = 1;  // 強制使用單聲道
    const length = buffer.length * 2;  // 16-bit = 2 bytes per sample
    const bufferOut = new ArrayBuffer(44 + length);
    const view = new DataView(bufferOut);
    
    // WAV Header
    writeUTFBytes(view, 0, 'RIFF');
    view.setUint32(4, 44 + length - 8, true);
    writeUTFBytes(view, 8, 'WAVE');
    writeUTFBytes(view, 12, 'fmt ');
    view.setUint32(16, 16, true);           // format chunk length
    view.setUint16(20, 1, true);            // format type (1 = PCM)
    view.setUint16(22, 1, true);            // 強制單聲道
    view.setUint32(24, 16000, true);        // 採樣率固定為 16000Hz
    view.setUint32(28, 16000 * 2, true);    // byte rate (16000 * 2 bytes per sample)
    view.setUint16(32, 2, true);            // block align
    view.setUint16(34, 16, true);           // bits per sample
    writeUTFBytes(view, 36, 'data');
    view.setUint32(40, length, true);
    
    // 轉換音頻數據為16-bit PCM
    const channelData = buffer.getChannelData(0);
    let offset = 44;
    for (let i = 0; i < channelData.length; i++) {
        const sample = Math.max(-1, Math.min(1, channelData[i]));
        const value = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
        view.setInt16(offset, value, true);
        offset += 2;
    }
    
    return bufferOut;
}

function writeUTFBytes(view, offset, string) {
    for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
    }
}

async function transcribeAudio(audioBlob) {
    try {
        // 將音頻轉換為單聲道 16kHz（Google Speech-to-Text 推薦格式）
        const audioContext = new AudioContext({
            sampleRate: 16000
        });
        const audioData = await audioBlob.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(audioData);
        
        // 轉換為單聲道
        const monoBuffer = audioContext.createBuffer(
            1,
            audioBuffer.length,
            audioBuffer.sampleRate
        );
        const monoData = monoBuffer.getChannelData(0);
        
        // 如果是立體聲，將聲道混合為單聲道
        if (audioBuffer.numberOfChannels === 2) {
            const left = audioBuffer.getChannelData(0);
            const right = audioBuffer.getChannelData(1);
            for (let i = 0; i < audioBuffer.length; i++) {
                monoData[i] = (left[i] + right[i]) / 2;
            }
        } else {
            // 如果已經是單聲道，直接複製
            const sourceData = audioBuffer.getChannelData(0);
            monoData.set(sourceData);
        }
        
        // 創建新的 Blob
        const wavBuffer = await audioBufferToWav(monoBuffer);
        const processedBlob = new Blob([wavBuffer], { type: 'audio/wav' });
        
        // 發送到服務器
        const formData = new FormData();
        formData.append('audio', processedBlob, 'audio.wav');
        formData.append('sessionid', sessionId);

        const response = await fetch('https://talk-demo.aitago.tw:9880/transcribe2', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            throw new Error('轉錄請求失敗');
        }
        
        const result = await response.json();
        console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Google STT result:', result.input_text);
        console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' ai answer result:', result.text);
        
        // 使用時間戳產生唯一ID
        const uniqueId = 'ai-response-' + Date.now();
        
        // 每次對話建立一個新的對話容器，包含使用者訊息和AI回應區域
        const dialogContainer = document.createElement('div');
        dialogContainer.className = 'dialog-pair';
        
        // 將用戶的輸入顯示在對話歷史中
        const userMessage = document.createElement('div');
        userMessage.innerHTML = `<div class="chat-message user-message">${result.input_text}</div>`;
        dialogContainer.appendChild(userMessage);
        
        // 建立打字指示器作為AI回應的預留位置
        const aiMessage = document.createElement('div');
        aiMessage.id = uniqueId;
        aiMessage.innerHTML = `
            <div class="chat-message ai-message typing-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        `;
        dialogContainer.appendChild(aiMessage);
        
        // 將整個對話容器添加到聊天歷史
        chatHistory.appendChild(dialogContainer);
        chatHistory.scrollTop = chatHistory.scrollHeight;
        
        // 清空transcriptionResult
        transcriptionResult.innerHTML = '';
        
        // 在HTML中添加當前對話的ID，用於API回調確認
        const speakingStatusElement = document.createElement('div');
        speakingStatusElement.id = 'speaking-status-indicator';
        speakingStatusElement.setAttribute('data-response-id', uniqueId);
        speakingStatusElement.style.display = 'none';
        document.body.appendChild(speakingStatusElement);
        
        // 發送請求給虛擬人
        await humantalk(result.text);
        
        // 監聽虛擬人實際開始說話的狀態
        const checkIfSpeaking = setInterval(async () => {
            try {
                const response = await fetch('https://talk-demo.aitago.tw/is_speaking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionid: parseInt(sessionId) })
                });
                const speakingStatus = await response.json();
                
                // 當虛擬人開始說話時，更新對話記錄
                if (speakingStatus.data === true) {
                    clearInterval(checkIfSpeaking);
                    
                    // 找到並替換臨時的打字指示器為實際AI回應
                    const tempAiMessage = document.getElementById(uniqueId);
                    if (tempAiMessage) {
                        tempAiMessage.innerHTML = `<div class="chat-message ai-message">${result.text}</div>`;
                    }
                    
                    // 保存完整對話歷史
                    const dialogSet = {
                        user: result.input_text,
                        ai: result.text
                    };
                    dialogHistory.push(dialogSet);
                    
                    // 這裡調用updateChatDisplay來限制顯示的對話數量
                    updateChatDisplay();
                    
                    // 清除臨時元素
                    document.body.removeChild(speakingStatusElement);
                }
                
                // 超時處理也需要調用updateChatDisplay
                setTimeout(() => {
                    if (document.getElementById('speaking-status-indicator')) {
                        clearInterval(checkIfSpeaking);
                        
                        // 找到並替換臨時的打字指示器為實際AI回應
                        const tempAiMessage = document.getElementById(uniqueId);
                        if (tempAiMessage) {
                            tempAiMessage.innerHTML = `<div class="chat-message ai-message">${result.text}</div>`;
                        }
                        
                        // 保存完整對話歷史
                        const dialogSet = {
                            user: result.input_text,
                            ai: result.text
                        };
                        dialogHistory.push(dialogSet);
                        
                        // 這裡調用updateChatDisplay來限制顯示的對話數量
                        updateChatDisplay();
                        
                        // 清除臨時元素
                        document.body.removeChild(speakingStatusElement);
                    }
                }, 5000);
            } catch (error) {
                console.error('Error checking speaking status:', error);
            }
        }, 200);
        
        // 設置超時處理，避免永遠等待
        setTimeout(() => {
            if (document.getElementById('speaking-status-indicator')) {
                clearInterval(checkIfSpeaking);
                
                // 找到並替換臨時的打字指示器為實際AI回應
                const tempAiMessage = document.getElementById(uniqueId);
                if (tempAiMessage) {
                    tempAiMessage.innerHTML = `<div class="chat-message ai-message">${result.text}</div>`;
                }
                
                // 保存完整對話歷史
                const dialogSet = {
                    user: result.input_text,
                    ai: result.text
                };
                dialogHistory.push(dialogSet);
                
                // 清除臨時元素
                document.body.removeChild(speakingStatusElement);
            }
        }, 5000);

    } catch (error) {
        console.error('處理錯誤:', error);
        showError('處理失敗: ' + error.message);
        transcriptionResult.textContent = '處理失敗';
    }
}
    
            function startPlay() {
                $('#rtc_media_player').show();
                
                if (sdk) {
                    sdk.close();
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                }
                sdk = new SrsRtcWhipWhepAsync();
                
                videoElement.srcObject = sdk.stream;
    
                videoElement.addEventListener('loadedmetadata', () => {
                    if (!canvas) {
                        initializeGreenScreen(videoElement);
                    }
                });
    
                videoElement.addEventListener('playing', () => {
                    if (isGreenScreenEnabled && !animationFrameId) {
                        processFrame();
                    }
                });
    
                // const host = window.location.hostname;
                const streamName = sessionId === '0' ? 'livestream' : `livestream${sessionId}`;
                // const url = `https://${host}:1986/rtc/v1/whep/?app=live&stream=${streamName}`;
                const url = `https://talk-demo.aitago.tw:1986/rtc/v1/whep/?app=live&stream=${streamName}`;
                
                sdk.play(url).then(function(session) {
                    console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` +' WebRTC stream connected successfully');
                }).catch(function(reason) {
                    sdk.close();
                    $('#rtc_media_player').hide();
                    console.error('WebRTC stream error:', reason);
                    showError('串流連接失敗: ' + reason);
                });
            }
    
            // 綁定快速介紹按鈕事件
            document.getElementById('quickIntroButton').onclick = handleQuickIntro;

            recordButton.onclick = () => {
                if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                    requestMicrophoneAccess();
                    
                }
            };
            
            stopButton.onclick = stopRecording;
    
            document.addEventListener('keydown', function(event) {
                if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                    return;
                }
                
                if (event.key.toLowerCase() === 'r') {
                    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                        requestMicrophoneAccess();
                    }
                }
                
                if (event.key.toLowerCase() === 't') {
                    stopRecording();
                }
    
                if (event.code === 'Space') {
                    event.preventDefault();
                    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                        requestMicrophoneAccess();
                    } else {
                        stopRecording();
                    }
                }
            });
    
            chatHistory.addEventListener('touchstart', function(e) {
                e.stopPropagation();
            }, false);
    
            document.getElementById('voiceSelect').onchange = function() {
                const configType = parseInt(this.value);
                fetch('https://talk-demo.aitago.tw/switch_tts_endpoint', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sessionid: parseInt(sessionId),
                        config_type: configType
                    })
                });
                console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Voice type changed to ' + configType);
            };
    
            document.getElementById('avatarSelect').onchange = function() {
                const avatar_id = this.value;
                fetch('https://talk-demo.aitago.tw/switch_avatar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sessionid: parseInt(sessionId),
                        avatar_id: avatar_id
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0) {

                    }
                })
                .then(() => {
                    console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' Avatar changed to ' + avatar_id);
                })
                .catch(error => {
                    console.error('Error switching avatar:', error);
                    showError('切換虛擬人失敗');
                });
            };
    
            async function initializeUIWithConfig() {
                try {
                    const configResponse = await fetch('https://talk-demo.aitago.tw/get_current_config', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            sessionid: parseInt(sessionId)
                        })
                    });
                    const configData = await configResponse.json();
                    
                    if (configData.code === 0) {
                        const avatarsResponse = await fetch('https://talk-demo.aitago.tw/get_avatars');
                        const avatarsData = await avatarsResponse.json();
                        
                        const voicesResponse = await fetch('https://talk-demo.aitago.tw/get_voices');
                        const voicesData = await voicesResponse.json();
                        
                        if (avatarsData.code === 0 && voicesData.code === 0) {
                            const avatarSelect = document.getElementById('avatarSelect');
                            const voiceSelect = document.getElementById('voiceSelect');
                            
                            avatarSelect.innerHTML = '';
                            Object.values(avatarsData.data).forEach(avatar => {
                                const option = document.createElement('option');
                                option.value = avatar.id;
                                option.textContent = avatar.display_name;
                                avatarSelect.appendChild(option);
                            });
                            
                            voiceSelect.innerHTML = '';
                            Object.values(voicesData.data).forEach(voice => {
                                const option = document.createElement('option');
                                option.value = voice.id;
                                option.textContent = voice.name;
                                voiceSelect.appendChild(option);
                            });
                            
                            avatarSelect.value = configData.data.current_avatar_id;
                            voiceSelect.value = configData.data.current_voice_type.toString();
                        }
                    }
                    console.log(`${new Date().toISOString()}.${(performance.now() % 1000).toFixed(3).padStart(3, '0')}` + ' UI initialized');
                } catch (error) {
                    console.error('Error initializing UI:', error);
                    showError('初始化設定失敗');
                }
            }
    
            window.onbeforeunload = function() {
                if (audioStream) {
                    audioStream.getTracks().forEach(track => track.stop());
                }
                if (sdk) {
                    sdk.close();
                }
                if (checkSpeakingInterval) {
                    clearInterval(checkSpeakingInterval);
                }
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            };
            
            $(document).ready(async function() {
                $('#rtc_media_player').prop('muted', true);
                startCheckingSpeakingStatus();
                await initializeUIWithConfig();
                startPlay();
            });
        });
        </script>
